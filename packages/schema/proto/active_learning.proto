syntax = "proto3";
package henqo.schema.v1;
import "primitives.proto";

// SimulationCampaign — active learning campaign for OOD region coverage
message SimulationCampaign {
  string campaign_id = 1;
  string surrogate_family = 2;
  string ood_region_id = 3;
  CampaignStatus status = 4;
  repeated PlannedSimulation planned_simulations = 5;
  int32 n_planned = 6;
  int32 n_completed = 7;
  int32 n_validated = 8;
  string authorized_by = 9;
  string authorization_provenance_bundle_id = 10;
  float post_retrain_coverage_score = 11;
  string provenance_bundle_id = 12;
  string created_at = 13;
  string completed_at = 14;
}

message PlannedSimulation {
  string planned_id = 1;
  map<string, float> design_point = 2;   // feature name → SI value
  string simulation_case_id = 3;
  bool completed = 4;
  bool validated = 5;
}

enum CampaignStatus {
  CAMPAIGN_UNSPECIFIED = 0;
  CAMPAIGN_PLANNED = 1;
  CAMPAIGN_AUTHORIZED = 2;
  CAMPAIGN_RUNNING = 3;
  CAMPAIGN_COMPLETED = 4;
  CAMPAIGN_STAGED = 5;
  CAMPAIGN_MERGED = 6;
  CAMPAIGN_FAILED = 7;
}

// OodRegion — characterized out-of-distribution input region
message OodRegion {
  string region_id = 1;
  string surrogate_family = 2;
  string model_revision_id = 3;
  map<string, FloatRange> feature_bounds = 4;
  map<string, float> centroid = 5;
  int32 n_entries = 6;
  string campaign_id = 7;
  string first_seen = 8;
  string last_seen = 9;
  string provenance_bundle_id = 10;
}

// RetrainingRequest — audit record for a triggered retraining event
message RetrainingRequest {
  string request_id = 1;
  string surrogate_family = 2;
  string trigger_type = 3;       // "campaign_merged" | "benchmark_expired" | "calibration_drift" |
                                  // "spot_check_failure" | "schema_version_bump" | "scheduled_refresh"
  string trigger_detail = 4;
  string current_model_id = 5;
  string new_training_dataset_revision = 6;
  string authorized_by = 7;
  string training_job_id = 8;
  string provenance_bundle_id = 9;
  string created_at = 10;
}
