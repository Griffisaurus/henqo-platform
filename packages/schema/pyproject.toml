[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "henqo-schema"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "grpcio>=1.62.0",
    "grpcio-tools>=1.62.0",
    "protobuf>=4.25.0",
    "pint>=0.23",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.9",
    "ruff>=0.4",
    "grpc-stubs>=1.53",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=henqo_schema --cov-report=term-missing"

[tool.coverage.run]
source = ["henqo_schema"]
omit = ["henqo_schema/generated/*"]

[tool.mypy]
strict = true
exclude = ["src/generated/"]

[tool.ruff]
line-length = 100
target-version = "py311"
